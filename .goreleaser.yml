project_name: gascli

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: gascli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/calghar/gas-cli/cmd.version={{.Version}}
    binary: gascli

archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}-{{ .Os }}-{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - docs/**/*

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - typo

release:
  github:
    owner: calghar
    name: gas-cli
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

brews:
  - name: gascli
    repository:
      owner: calghar
      name: homebrew-gascli
    homepage: https://github.com/calghar/gas-cli
    description: Modern GitHub account switcher with Git includeIf and SSH multi-account support
    license: MIT
    install: |
      bin.install "gascli"
    test: |
      system "#{bin}/gascli", "--version"
